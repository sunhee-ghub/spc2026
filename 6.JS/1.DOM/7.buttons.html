<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>버튼 두개</h1>
    <div id="result">0</div> <!-- 이걸 가져다가 -->
    <div>
        <button onclick="increment()">+1</button>
        <button onclick="decrement()">-1</button>
    </div>

    <script>
        // 각자의 버튼이 눌릴 때마다 위에 div의 값을 가져다가 +1 또는 -1을 한다.
        function increment() {
            // console.log('+1 클릭')
            const result = document.getElementById('result');
            // console.log(result);
            // result = result + 1;
            let value = parseInt(result.textContent); // 문자를 읽어서 숫자로 바꾼다.
            value = value + 1;
            console.log(value);
            result.textContent = value;
        }
        function decrement() {
            // console.log('-1 클릭')
            document.getElementById('result').textContent -= 1;
            // console.log(result);
            // result = result - 1;
        }
    </script>
</body>
</html>

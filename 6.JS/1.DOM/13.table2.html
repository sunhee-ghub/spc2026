<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <table id="table1">
        <tr>
            <td>셀 1</td>
            <td>셀 2</td>
            <td>셀 3</td>
        </tr>
        <tr>
            <td>셀 4</td>
            <td>셀 5</td>
            <td>셀 6</td>
        </tr>
        <tr>
            <td>셀 7</td>
            <td>셀 8</td>
            <td>셀 9</td>
        </tr>
    </table>
    <hr>
    <table id="table2">
        <tr>
            <td>셀 1</td>
            <td>셀 2</td>
        </tr>
        <tr>
            <td>셀 3</td>
            <td>셀 4</td>
        </tr>
    </table>

    <button onclick="changeOddCells()">홀수셀 색상 변경</button>
    <button onclick="changeEvenCells()">짝수셀 색상 변경</button>

    <script>
    function changeOddCells() {
        const table1 = document.getElementById('table1');
        const cells = table1.getElementsByTagName('td');
        for (let i = 0; 1 < cells.length; i++) {
            if (i % 2 == 0) {
                cells[i].style.backgroundColor = 'lightgreen';
            }
        }
    }

    function changeEvenCells() {
        // const table2 = document.getElementById('table2');
        // const cells = table2.getElementsByTagName('td');
        const cells = document.querySelectorAll('#table1 td'); // CSS 셀렉터 형태로 내가 원하는 걸 잡을 수 있음
        console.log(cells);
        Array.from(cells).forEach((cell, index) => {
            if (index % 2 == 1) {
                cell.style.backgroundColor = 'lightblue';
            }
        });

    }
</script>
</body>
</html>

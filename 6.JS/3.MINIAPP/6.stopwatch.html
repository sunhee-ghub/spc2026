<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .stopwatch-box {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }

        #display {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #333;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .button-container button {
            flex: 1;
            padding: 10px 0;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        #startButton {
            background-color: #4CAF50;
            color: white;
        }

        #stopButton {
            background-color: #f44336;
            color: white;
        }

        #resetButton {
            background-color: #2196F3;
            color: white;
        }

        .button-container button:hover {
            opacity: 0.85;
            transform: scale(1.05);
        }

        .button-container button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <!-- 스톱워치 전체 -->
    <div class="stopwatch-box">
        <!-- 스톱워치 표시 영역 -->
        <div id="display">00:00:00</div>
        <!-- 스톱워치 버튼 컨테이너 -->
        <div class="button-container">
            <button id="startButton">시작</button>
            <button id="stopButton">중지</button>
            <button id="resetButton">리셋</button>
        </div>
    </div>
    <!-- 1. Start 버튼에 이벤트를 추가해서.
    00:00:00 있는 영역을 가져와서...
    시간 계산을 해서... 
    setInterval(  10ms ) 마다 업데이트 한다..

    2. Stop 버튼에 이벤트를 추가해서
    이 타이머를 클리어한다.

    3. Reset 버튼에 이벤트를 추가해서.
    00:00:00 으로 쓴다..

    ------------

    4. UX개선 (디자인, 버튼 활성/비활성화)
    <script>
        const display = document.getElementById("display");

        let startTime = 0;     // 시작 기준 시간
        let elapsedTime = 0;   // 누적 시간
        let timer = null;      // interval 저장용

        // 시간 포맷 함수 (ms → 00:00:00)
        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);

            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            return (
                String(hours).padStart(2, "0") + ":" +
                String(minutes).padStart(2, "0") + ":" +
                String(seconds).padStart(2, "0")
            );
        }

        // START
        document.getElementById('startButton').addEventListener('click', () => {
            if (timer !== null) return; // 중복 실행 방지

            startTime = Date.now() - elapsedTime;

            timer = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                display.textContent = formatTime(elapsedTime);
            }, 100);
        });

        // STOP
        document.getElementById('stopButton').addEventListener('click', () => {
            clearInterval(timer);
            timer = null;
        });

        // RESET
        document.getElementById('resetButton').addEventListener('click', () => {
            clearInterval(timer);
            timer = null;
            elapsedTime = 0;
            display.textContent = "00:00:00";
        });
    </script>
     -->
    <script>
        // 1. DOM요소를 다 가져온다
        const display = document.getElementById('display');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const resetButton = document.getElementById('resetButton');

        let startTime; // 스톱워치 시작 시간
        let difference = 0; // 경과 시간
        let running = false; // 현재 타이머 상태

        function startTimer() {
            if (running) return;

            running = true;
            startTime = new Date().getTime();
            timerId = setInterval(updateTimer, 10);
        }

        function updateTimer() {
            updatedTime = new Date().getTime();
            difference = updatedTime - startTime; // 경과 시간 계산

            let minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60)); // 흘러간 ms 에서 분 계산
            let seconds = Math.floor((difference % (1000 * 60)) / (1000)); // 거기에서 초 계산
            let milliseconds = Math.floor((difference % 1000) / 10); // 나머지 ms 계산

            // console.log(`흘러간 시간 계산 ${minutes}분, ${seconds}초, ${milliseconds}ms`)
            display.textContent = 
                (minutes < 10 ? '0' + minutes : minutes) + ':' +
                (seconds < 10 ? '0' + seconds : seconds) + '.' +
                (milliseconds < 10 ? '0' + milliseconds : milliseconds);
        }

        function stopTimer() {}

        startButton.addEventListener('click', startTimer);
        stopButton.addEventListener('click', 클릭시호출할함수);
        // resetButton.addEventListener('click', 클릭시호출할함수);
    </script>
</body>
</html>

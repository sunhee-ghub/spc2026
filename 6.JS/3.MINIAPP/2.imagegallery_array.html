<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>이미지 갤러리</h1>
    <div class="gallery">
        <img src="images/cat1.jpg", width="100px">
        <img src="images/cat2.jpg", width="100px">
        <img src="images/cat3.jpg", width="100px">
    </div>

    <!-- 방법1. -->
    <img id="large-image" src="">

    <script>
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const img3 = document.getElementById('img3');

        const imags = [img1, img2, img3]
        imgs.forEach((img) => {
            img.addEventListener('click', () => {
                const large = document.getElementById('large-image');
                large.src = img1.src;
                large.width = '400';
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            text-align: center;
        }
        .slider {
            display: flex;
            flex-direction: column;
            margin: 0 auto; /* 상하 좌우 */
            text-align: center;
            max-width: 600px;
            align-items: center;
        }
        .slider img {
            max-width: 100%;
            height: 300px;
            display: none; /* 기본 다 숨김 */
        }
        .slider img.active {
            display: block; /* 활성화된 이미지는 표시 */
        }
        .buttons {
            margin-top: 20px;
        }
        .button {
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>이미지 슬라이더</h1>
    <div class="slider">
        <img id="img1" src="images/cat1.jpg" class="active">
        <img id="img2" src="images/cat2.jpg">
        <img id="img3" src="images/cat3.jpg">

        <div class="filename" id="filename">images/cat1.jpg</div>

        <div class="button">
            <button id="prevBtn">이전</button>
            <button id="nextBtn">다음</button>
        </div>
    </div>

    <script>
        const imgs = document.querySelectorAll('.slider img');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const filename = document.getElementById('filename');

        let index = 0;

        function show(direction) {
            imgs[index].classList.remove('active');
            index += direction;

            imgs[index].classList.add('active');

            filename.textContent = imgs[index].src.split('/').slice(-2).join('/');

            if (index +1 >= imgs.length) { 
                nextBtn.disabled = true
            } else {
                nextBtn.disabled = false
            }
            if (index -1 < 0) {
                prevBtn.disabled = true
            } else {
                prevBtn.disabled = false
            }
        }

        nextBtn.addEventListener('click', () => {show(1)})
        prevBtn.addEventListener('click', () => {show(-1)})
    </script>

</html>

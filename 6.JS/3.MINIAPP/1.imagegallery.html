<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>이미지 갤러리</h1>
    <div class="gallery">
        <img id="img1" src="images/cat1.jpg" width="100px">
        <img id="img2" src="images/cat2.jpg" width="100px">
        <img id="img3" src="images/cat3.jpg" width="100px">
    </div>

    <!-- 방법1. -->
    <img id="large-image" src="">

    <script>
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const img3 = document.getElementById('img3');
        img1.addEventListener('click', () => {
            const large = document.getElementById('large-image');
            large.src = img1.src;
            large.width = '400';
        });
        img2.addEventListener('click', () => {
            const large = document.getElementById('large-image');
            large.src = img2.src;
            large.width = '400';
        });
        img3.addEventListener('click', () => {
            const large = document.getElementById('large-image');
            large.src = img3.src;
            large.width = '400';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #myButton {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="myButton">마우스를 올려보세요.</div>
    <script>
        document.getElementById('myButton').addEventListener('mouseover', () => {
            console.log('마우스가 올라갔어요.');
        })

        document.getElementById('myButton').addEventListener('mouseout', () => {
            console.log('마우스가 나갔어요.');
        })

        document.getElementById('myButton').addEventListener('mousemove', () => {
            console.log(`마우스 X: ${event.clientX}, Y: ${event.clientY}`);
    });
    </script>
</body>
</html>

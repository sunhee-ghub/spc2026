<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.5">
    <title>Document</title>
    <style>
        #sizeInfo {
            font-size: 18px;
            line-height: 1.6;
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>당신의 화면 정보는 다음과 같습니다.</h1>
    <div id="sizeInfo"></div>
    <script>
        function updatewindowInfo() {
            const innerWidth = window.innerWidth;
            const innerHeight = window.innerHeight;
            
            const outerWidth = window.outerWidth;  
            const outerHeight = window.outerHeight;

            const screenWidth = window.screen.width;  // 모니터의 해상도
            const screenHeight = window.screen.height;

            const sizeInfo = document.getElementById('sizeInfo');
            sizeInfo.innerHTML = `
                <strong>뷰포트(viewport) = window.inner</strong>
                Width: ${innerWidth} px <br>
                Height: ${innerHeight} px <br><br>
                <strong>브라우저 크기 = window.outer</strong>
                Width: ${outerWidth} px <br>
                Height: ${outerHeight} px <br><br>
                <strong>화면 해상도</strong>
                Width: ${screenWidth} px <br>
                Height: ${screenHeight} px`
        };

        window.addEventListener('load', () => {  // 타이밍 이슈 (타이밍 버그)
            setTimeout(updatewindowInfo, 50);  // 50ms 딜레이를 통해서 브라우저의 랜더리가 올바르게 초기화 된 이후에 계산
        });
        // updateWindowInfo(); // 화면 최초 로딩시에 표시하기 위해서 1회 수동 호출

        window.addEventListener('resize', updatewindowInfo);
    </script>
</body>
</html>
